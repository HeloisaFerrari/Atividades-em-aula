<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    
    /* Escreva seu CSS dentro da tag Style! */

    .blue-box{
      position: relative;
      background-color: blue;
      margin: 100px;
      width:250px;
      height: 200px;
      
    }

    .red-circle{
        position: absolute;
      background-color: red;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      padding: 20px;
      margin: 100px;

      
    }
    
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
